name: Weekly Job Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC = 08:00 Berlin (CET) / 09:00 CEST
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit seen_jobs.json back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r Projects/job_agent/requirements.txt

      - name: Run job pipeline
        working-directory: Projects/job_agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          # Optional: store resume/reference as secrets instead of committed files
          # RESUME_TEXT: ${{ secrets.RESUME_TEXT }}
          # ARBEITSZEUGNIS_TEXT: ${{ secrets.ARBEITSZEUGNIS_TEXT }}
        run: python pipeline.py

      - name: Commit updated seen_jobs.json
        working-directory: Projects/job_agent
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
